name: Electron Build

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            build-script: buildWindowsApp
          - os: macos-latest
            arch: x64
            build-script: buildMacApp
          - os: ubuntu-latest
            arch: x64
            build-script: buildLinuxApp
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache Electron zip
        uses: actions/cache@v4
        with:
          path: .electron-cache
          key: electron-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('process/package.json') }}

      - name: Install dependencies
        run: npm run installDependencies
        env:
          npm_config_arch: ${{ matrix.arch }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Download Electron binary
        shell: bash
        env:
          ELECTRON_ARCH: ${{ matrix.arch }}
        run: |
          VERSION=$(node -p "require('./process/node_modules/electron/package.json').version")
          ARCH="${ELECTRON_ARCH}"
          case "$RUNNER_OS" in
            Windows) PLATFORM="win32" ;;
            macOS)   PLATFORM="darwin" ;;
            *)       PLATFORM="linux"  ;;
          esac
          DIST="process/node_modules/electron/dist"
          CACHE_FILE=".electron-cache/electron-v${VERSION}-${PLATFORM}-${ARCH}.zip"
          mkdir -p ".electron-cache"
          if [ ! -f "$CACHE_FILE" ]; then
            URL="https://github.com/electron/electron/releases/download/v${VERSION}/electron-v${VERSION}-${PLATFORM}-${ARCH}.zip"
            echo "Downloading $URL"
            curl -fL --retry 3 --retry-delay 5 "$URL" -o "$CACHE_FILE"
          else
            echo "Using cached $CACHE_FILE"
          fi
          rm -rf "$DIST"
          mkdir -p "$DIST"
          unzip -q "$CACHE_FILE" -d "$DIST"
          if [[ "$PLATFORM" == "linux" ]]; then
            chmod +x "$DIST/electron"
          fi
          echo "Electron dist contents: $(ls $DIST | head -5)"

      - name: Verify Electron binary
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Windows) BINARY="process/node_modules/electron/dist/electron.exe" ;;
            macOS)   BINARY="process/node_modules/electron/dist/Electron.app" ;;
            *)       BINARY="process/node_modules/electron/dist/electron" ;;
          esac
          if [ ! -e "$BINARY" ]; then
            echo "ERROR: Electron binary not found: $BINARY"
            ls -la process/node_modules/electron/dist/ 2>/dev/null || echo "dist/ missing"
            exit 1
          fi
          echo "OK: $BINARY"

      - name: Build Electron app
        run: npm run ${{ matrix.build-script }}
        env:
          npm_config_arch: ${{ matrix.arch }}
          ELECTRON_ARCH: ${{ matrix.arch }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nh-toolbox-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            target/dist/**
