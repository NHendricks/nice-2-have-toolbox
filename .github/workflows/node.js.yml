name: Electron Build

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            build-script: buildWindowsApp
          - os: macos-latest
            arch: x64
            build-script: buildMacApp
          - os: ubuntu-latest
            arch: x64
            build-script: buildLinuxApp
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: .electron-cache
          key: electron-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('process/package.json') }}

      - name: Install dependencies
        run: npm run installDependencies
        env:
          npm_config_arch: ${{ matrix.arch }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Download Electron binary
        working-directory: process
        run: node node_modules/electron/install.js
        env:
          ELECTRON_ARCH: ${{ matrix.arch }}
          ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache

      - name: Verify Electron binary
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BINARY="process/node_modules/electron/dist/electron.exe"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            BINARY="process/node_modules/electron/dist/Electron.app"
          else
            BINARY="process/node_modules/electron/dist/electron"
          fi
          if [ ! -e "$BINARY" ]; then
            echo "ERROR: Electron binary not found: $BINARY"
            ls -la process/node_modules/electron/dist/ 2>/dev/null || echo "dist/ missing"
            exit 1
          fi
          echo "OK: $BINARY"

      - name: Build Electron app
        run: npm run ${{ matrix.build-script }}
        env:
          npm_config_arch: ${{ matrix.arch }}
          ELECTRON_ARCH: ${{ matrix.arch }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nh-toolbox-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            target/dist/**
